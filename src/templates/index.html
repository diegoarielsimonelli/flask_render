{% extends 'base.html' %} {% block content %}
<h2>Listado de Estudiantes</h2>
<a href="{{ url_for('estudiantes.crear') }}" class="btn btn-primary"
  >+ Agregar Estudiante</a
>

<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Email</th>
      <th>Edad</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for e in estudiantes %}
    <tr>
      <td>{{ e.nombre }}</td>
      <td>{{ e.email }}</td>
      <td>{{ e.edad }}</td>
      <td>
        <a
          href="{{ url_for('estudiantes.editar', id=e.id) }}"
          class="btn btn-secondary"
          style="color: white"
          >Editar</a
        >
        <form
          action="{{ url_for('estudiantes.eliminar', id=e.id) }}"
          method="POST"
          style="display: inline; padding: 0; box-shadow: none"
        >
          <button
            type="submit"
            class="btn btn-danger"
            onclick="return confirm('¿Seguro deseas eliminar?');"
          >
            Eliminar
          </button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
