{% extends 'base.html' %} {% block content %}
<h2>{% if estudiante %}Editar{% else %}Agregar{% endif %} Estudiante</h2>

<form method="POST">
  <label>Nombre:</label>
  <input
    type="text"
    name="nombre"
    value="{{ estudiante.nombre if estudiante else '' }}"
    required
  />

  <label>Email:</label>
  <input
    type="email"
    name="email"
    value="{{ estudiante.email if estudiante else '' }}"
    required
  />

  <label>Edad:</label>
  <input
    type="number"
    name="edad"
    value="{{ estudiante.edad if estudiante else '' }}"
    required
  />

  <button type="submit" class="btn btn-primary">Guardar</button>
  <a href="{{ url_for('estudiantes.index') }}" class="btn btn-secondary"
    >Cancelar</a
  >
</form>
{% endblock %}
